<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Zelechat</title>
<link rel="icon" type="image/png" href="flyerslogo.png?v=2">
<link rel="apple-touch-icon" href="flyerslogo.png?v=2">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>

<style>
/* =====================================================
   VARIABLES
===================================================== */
:root {
  --bg0: #08080f;
  --bg1: #111119;
  --bg2: #1a1a26;
  --bg3: #222232;
  --orange:      #ff7b1c;
  --orange-dim:  #c45b0e;
  --orange-glow: rgba(255,123,28,0.18);
  --orange-text: #ffac6a;
  --purple:      #9b78c8;
  --purple-dim:  rgba(155,120,200,0.18);
  --grey:        #8a8a9a;
  --grey-dim:    #4a4a5a;
  --text:        #ede8df;
  --text-soft:   #a09890;
  --text-muted:  #575465;
  --border:      rgba(255,123,28,0.18);
  --border-soft: rgba(255,255,255,0.06);
  --red:         #ff5555;
  --green:       #44ff88;
  --shadow:      0 8px 32px rgba(0,0,0,0.6);
  --radius:      14px;
}

*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}

body{
  font-family:'DM Sans',sans-serif;
  font-size:16px;
  background:var(--bg0);
  color:var(--text);
  display:flex;
  flex-direction:column;
  height:100dvh;
}

/* =====================================================
   SCROLLBARS
===================================================== */
::-webkit-scrollbar{width:3px;height:3px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}

/* =====================================================
   SVG ICON HELPER
===================================================== */
.icon{
  display:inline-flex;align-items:center;justify-content:center;
  flex-shrink:0;
}
.icon svg{display:block;}

/* =====================================================
   LOGIN SCREEN
===================================================== */
#login-screen{
  display:flex;align-items:center;justify-content:center;
  flex:1;padding:16px;
  background:
    radial-gradient(ellipse 70% 50% at 50% 110%, rgba(255,123,28,0.12) 0%, transparent 70%),
    var(--bg0);
  overflow-y:auto;
}

.login-card{
  width:100%;max-width:410px;
  background:var(--bg1);
  border:1px solid var(--border);
  border-radius:20px;
  padding:32px 28px 28px;
  box-shadow:var(--shadow), 0 0 60px rgba(255,123,28,0.06);
}

/* Logo row */
.login-logo-row{
  display:flex;align-items:center;justify-content:center;
  gap:10px;margin-bottom:5px;
}
.login-logo-img{
  width:46px;height:46px;
  object-fit:contain;
  flex-shrink:0;
}
.login-logo-text{
  font-family:'Syne',sans-serif;
  font-size:2.3rem;font-weight:800;
  color:var(--orange);
  letter-spacing:-0.02em;
  text-shadow:0 0 30px rgba(255,123,28,0.45);
  line-height:1;
}

/* 3. Updated Tagline */
.login-tagline{
  text-align:center;font-size:0.82rem;
  color:var(--text-muted);letter-spacing:0.08em;
  text-transform:uppercase;margin-bottom:24px;
  font-weight: 600;
}

/* Avatar picker */
.avatar-picker{
  display:flex;flex-direction:column;align-items:center;gap:8px;
  margin-bottom:22px;
}
.avatar-ring{
  width:96px;height:96px;border-radius:50%;
  border:2px solid var(--orange);
  background:var(--bg2);
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;
  box-shadow:0 0 20px rgba(255,123,28,0.25), inset 0 0 10px rgba(0,0,0,0.3);
  cursor:pointer;
  transition:box-shadow 0.25s;
}
.avatar-ring:hover{box-shadow:0 0 30px rgba(255,123,28,0.45), inset 0 0 10px rgba(0,0,0,0.3);}
.avatar-ring img{width:82px;height:82px;image-rendering:pixelated;}

.pokemon-label{
  font-size:0.78rem;color:var(--text-soft);
  font-family:'DM Mono',monospace;
}

.btn-reroll{
  background:none;border:1px solid var(--border);border-radius:20px;
  color:var(--text-soft);padding:5px 16px;
  font-size:0.82rem;cursor:pointer;
  font-family:'DM Sans',sans-serif;
  transition:all 0.2s;
  display:flex;align-items:center;gap:7px;
}
.btn-reroll:hover{border-color:var(--orange);color:var(--orange);}

/* Form */
.field{margin-bottom:15px;}
.field label{
  display:block;font-size:0.74rem;
  text-transform:uppercase;letter-spacing:0.1em;
  color:var(--text-muted);margin-bottom:6px;
}
.field input{
  width:100%;background:var(--bg2);
  border:1px solid var(--border-soft);border-radius:10px;
  color:var(--text);padding:12px 14px;
  font-size:1rem;font-family:'DM Sans',sans-serif;
  outline:none;transition:border-color 0.2s,box-shadow 0.2s;
}
.field input:focus{
  border-color:var(--orange);
  box-shadow:0 0 0 3px var(--orange-glow);
}
.field input::placeholder{color:var(--text-muted);}

.pw-wrap{position:relative;}
.pw-wrap input{padding-right:44px;}

.eye-btn{
  position:absolute;right:12px;top:50%;transform:translateY(-50%);
  background:none;border:none;cursor:pointer;
  color:var(--text-muted);padding:3px;
  transition:color 0.2s;line-height:0;
}
.eye-btn:hover{color:var(--orange);}
.eye-btn svg{display:block;}

.err-msg{color:var(--red);font-size:0.81rem;margin-top:5px;display:none;}

.btn-enter{
  width:100%;background:var(--orange);border:none;border-radius:10px;
  color:#000;font-weight:700;font-size:1.05rem;
  font-family:'DM Sans',sans-serif;
  padding:13px;cursor:pointer;margin-top:7px;
  transition:background 0.2s,transform 0.1s,box-shadow 0.2s;
  box-shadow:0 4px 16px rgba(255,123,28,0.35);
}
.btn-enter:hover{background:#ff9244;box-shadow:0 4px 24px rgba(255,123,28,0.5);}
.btn-enter:active{transform:scale(0.97);}

/* =====================================================
   CHAT SCREEN
===================================================== */
#chat-screen{display:none;flex-direction:column;height:100dvh;overflow:hidden;}

/* Header */
.chat-header{
  background:var(--bg1);
  border-bottom:1px solid var(--border);
  padding:10px 16px;
  display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;
  box-shadow:0 2px 12px rgba(0,0,0,0.4);
  position:relative;z-index:20;
}

.header-left{display:flex;align-items:center;gap:10px;}
.header-logo{width:34px;height:34px;object-fit:contain;flex-shrink:0;}
.header-title{
  font-family:'Syne',sans-serif;
  font-size:1.35rem;font-weight:800;
  color:var(--orange);
  text-shadow:0 0 16px rgba(255,123,28,0.4);
  letter-spacing:-0.01em;
}

/* Users toggle */
.users-panel{position:relative;}
.users-btn{
  background:var(--bg2);border:1px solid var(--border);border-radius:20px;
  color:var(--text);padding:7px 14px;cursor:pointer;
  display:flex;align-items:center;gap:7px;
  font-size:0.88rem;font-family:'DM Sans',sans-serif;
  transition:border-color 0.2s;white-space:nowrap;
}
.users-btn:hover{border-color:var(--orange);}
.online-dot{
  width:7px;height:7px;border-radius:50%;
  background:var(--green);
  box-shadow:0 0 6px var(--green);
  flex-shrink:0;
}
.users-btn .count{color:var(--orange);font-weight:600;}

.users-dropdown{
  display:none;
  position:absolute;top:calc(100% + 8px);right:0;
  background:var(--bg1);border:1px solid var(--border);
  border-radius:var(--radius);padding:10px;
  min-width:200px;max-height:300px;overflow-y:auto;
  z-index:100;box-shadow:var(--shadow);
  animation:fadeSlide 0.15s ease;
}
.users-dropdown.open{display:block;}

@keyframes fadeSlide{
  from{opacity:0;transform:translateY(-6px);}
  to{opacity:1;transform:translateY(0);}
}

.users-header{
  font-size:0.71rem;text-transform:uppercase;letter-spacing:0.1em;
  color:var(--text-muted);
  padding:0 4px 7px;
  border-bottom:1px solid var(--border-soft);margin-bottom:6px;
}
.user-row{
  display:flex;align-items:center;gap:9px;
  padding:6px 4px;border-radius:8px;
  transition:background 0.15s;
}
.user-row:hover{background:var(--bg2);}
.user-row img{
  width:32px;height:32px;border-radius:50%;
  background:var(--bg2);image-rendering:pixelated;
  border:1px solid var(--border-soft);flex-shrink:0;
}
.user-row .uname{font-size:0.88rem;color:var(--text);}
.user-row.me-row .uname::after{
  content:' (you)';color:var(--text-muted);font-size:0.78rem;
}

/* Reset notice bar */
.reset-notice{
  background:var(--bg2);
  border-bottom:1px solid var(--border-soft);
  text-align:center;
  font-size:0.75rem;
  color:var(--text-muted);
  padding:5px 12px;
  flex-shrink:0;
  font-family:'DM Mono',monospace;
  letter-spacing:0.03em;
}

/* Messages */
.messages-area{
  flex:1;overflow-y:auto;
  padding:14px 14px 6px;
  display:flex;flex-direction:column;gap:11px;
}

/* Message wrapper */
.msg-wrap{
  display:flex;gap:8px;max-width:82%;
  animation:msgIn 0.2s ease;
}
@keyframes msgIn{
  from{opacity:0;transform:translateY(8px);}
  to{opacity:1;transform:translateY(0);}
}
.msg-wrap.mine{align-self:flex-end;flex-direction:row-reverse;}
.msg-wrap.theirs{align-self:flex-start;}

.msg-av{
  width:38px;height:38px;border-radius:50%;
  background:var(--bg2);flex-shrink:0;
  align-self:flex-end;overflow:hidden;
  border:1px solid var(--border-soft);
}
.msg-av img{width:100%;height:100%;image-rendering:pixelated;}

.msg-col{display:flex;flex-direction:column;gap:3px;min-width:0;}
.msg-wrap.mine .msg-col{align-items:flex-end;}
.msg-wrap.theirs .msg-col{align-items:flex-start;}

.msg-meta{
  display:flex;align-items:center;gap:5px;
  font-size:0.72rem;color:var(--text-muted);
  font-family:'DM Mono',monospace;padding:0 4px;
}
.msg-wrap.mine .msg-meta{flex-direction:row-reverse;}
.msg-meta .uname{
  font-family:'DM Sans',sans-serif;font-weight:500;
  color:var(--orange-text);font-size:0.76rem;
}

/* Bubble */
.msg-bubble{
  position:relative;
  background:var(--bg2);
  border:1px solid var(--border-soft);
  border-radius:16px;
  padding:10px 38px 10px 13px; 
  font-size:0.97rem;
  line-height:1.55;
  word-break:break-word;max-width:100%;
}
.msg-wrap.mine .msg-bubble{
  background:var(--orange);color:#0d0d0d;
  border-color:transparent;border-bottom-right-radius:4px;
}
.msg-wrap.theirs .msg-bubble{border-bottom-left-radius:4px;}

.msg-bubble img.chat-img{
  display:block;max-width:230px;max-height:190px;
  border-radius:10px;cursor:pointer;transition:opacity 0.2s;
}
.msg-bubble img.chat-img:hover{opacity:0.88;}

/* Reply quote */
.rq{
  border-left:3px solid var(--purple);
  background:var(--purple-dim);
  border-radius:0 6px 6px 0;
  padding:4px 9px;margin-bottom:7px;
  font-size:0.82rem;max-width:100%;
}
.msg-wrap.mine .rq{
  border-left-color:rgba(0,0,0,0.35);
  background:rgba(0,0,0,0.15);
}
.rq-who{font-weight:600;margin-bottom:1px;font-size:0.77rem;}
.rq-preview{opacity:0.72;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;max-width:230px;}

/* Edited */
.edited-tag{font-size:0.68rem;opacity:0.42;margin-left:5px;font-style:italic;}

/* =====================================================
   REACTIONS UI
===================================================== */
.reactions-row {
  display: flex; gap: 6px; margin-top: 6px; flex-wrap: wrap;
}
.react-badge {
  background: var(--bg1);
  border: 1px solid var(--border-soft);
  border-radius: 12px;
  padding: 2px 7px;
  font-size: 0.8rem;
  cursor: pointer;
  display: flex; align-items: center; gap: 4px;
  transition: all 0.2s;
}
.msg-wrap.mine .react-badge { background: rgba(0,0,0,0.1); border-color: rgba(0,0,0,0.2); }
.react-badge:hover { border-color: var(--orange); }
.react-badge.reacted { background: var(--orange-glow); border-color: var(--orange); }
.rcount { font-family: 'DM Mono', monospace; font-size: 0.75rem; color: var(--text-soft); }
.msg-wrap.mine .rcount { color: rgba(0,0,0,0.7); }

.emoji-btn {
  cursor: pointer; font-size: 1.15rem; transition: transform 0.1s;
  padding: 3px 5px; border-radius: 6px;
}
.emoji-btn:hover { transform: scale(1.2); background: rgba(255,255,255,0.1); }
.msg-wrap.mine .emoji-btn:hover { background: rgba(0,0,0,0.1); }

/* =====================================================
   MESSAGE ACTIONS — improved visibility & position
===================================================== */

.bubble-trigger{
  position:absolute;
  top:6px;
  right:6px;
  width:32px;height:32px; 
  border-radius:50%;
  background:transparent;
  border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  opacity: 0.85; /* 2. Always easily visible */
  color: var(--orange); /* 2. Orange dot color */
  transition:opacity 0.15s, background 0.15s;
  z-index:5;
  padding:0;
}
.msg-bubble:hover .bubble-trigger,
.bubble-trigger:focus,
.bubble-trigger.active{
  opacity:1;
}
.bubble-trigger:hover{background:rgba(255,255,255,0.1);}
.msg-wrap.mine .bubble-trigger:hover{background:rgba(0,0,0,0.15);}
.bubble-trigger svg{pointer-events:none;}

/* Action menu base */
.bubble-actions{
  display:none;
  position:absolute;
  top:-50px;
  background:var(--bg1);
  border:1px solid var(--border);
  border-radius:12px;
  padding:8px;
  gap:4px;z-index:30;
  white-space:nowrap;
  box-shadow:0 6px 24px rgba(0,0,0,0.6);
  animation:fadeSlide 0.1s ease;
  flex-direction: column;
}

/* 2. Position fixes so it doesn't get cut off! */
.msg-wrap.mine .bubble-actions {
  right: 0; left: auto;
}
.msg-wrap.theirs .bubble-actions {
  left: 0; right: auto; /* Expands to the right instead of off-screen left */
}

/* Invisible bridge so the mouse doesn't fall off when moving to the menu */
.bubble-actions::after {
  content: '';
  position: absolute;
  bottom: -20px; left: 0; right: 0; height: 20px;
}

.bubble-trigger:hover + .bubble-actions,
.bubble-trigger.active + .bubble-actions,
.bubble-actions:hover{display:flex;}
.bubble-trigger:focus + .bubble-actions{display:flex;}

.bact{
  background:none;border:none;cursor:pointer;
  color:var(--grey);
  padding:6px 10px;border-radius:7px;
  font-size:0.8rem;font-family:'DM Sans',sans-serif;
  transition:color 0.15s,background 0.15s;
  display:flex;align-items:center;gap:6px;
  font-weight:500;
  width: 100%;
}
.bact:hover{color:var(--orange);background:var(--orange-glow);}
.bact.del:hover{color:var(--red);background:rgba(255,85,85,0.12);}
.bact svg{flex-shrink:0;}

/* =====================================================
   REPLY / EDIT BARS
===================================================== */
.context-bar{
  display:none;background:var(--bg1);
  border-top:1px solid var(--border);
  padding:8px 15px;align-items:center;gap:10px;
  font-size:0.84rem;flex-shrink:0;
  animation:slideUp 0.15s ease;
}
.context-bar.show{display:flex;}

@keyframes slideUp{
  from{opacity:0;transform:translateY(4px);}
  to{opacity:1;transform:translateY(0);}
}
.cbar-icon{font-size:1rem;flex-shrink:0;line-height:0;}
.cbar-icon svg{display:block;}
.cbar-text{flex:1;color:var(--text-soft);overflow:hidden;}
.cbar-name{color:var(--orange);font-weight:600;}
.cbar-preview{opacity:0.68;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.cbar-close{
  background:none;border:none;cursor:pointer;
  color:var(--text-muted);line-height:0;padding:3px;
  transition:color 0.15s;flex-shrink:0;
}
.cbar-close:hover{color:var(--orange);}
.cbar-close svg{display:block;}

/* =====================================================
   INPUT AREA
===================================================== */
.input-zone{
  background:var(--bg1);border-top:1px solid var(--border);
  padding:10px 12px;
  display:flex;align-items:flex-end;gap:8px;flex-shrink:0;
}
.input-pill{
  flex:1;background:var(--bg2);
  border:1px solid var(--border-soft);border-radius:22px;
  display:flex;align-items:flex-end;
  padding:9px 13px;gap:8px;
  transition:border-color 0.2s;
}
.input-pill:focus-within{border-color:var(--orange);}

#msg-input{
  flex:1;background:none;border:none;outline:none;
  color:var(--text);font-size:1rem;
  resize:none;max-height:110px;min-height:22px;
  line-height:1.5;font-family:'DM Sans',sans-serif;
}
#msg-input::placeholder{color:var(--text-muted);}

.attach-btn{
  background:none;border:none;cursor:pointer;
  color:var(--text-muted);padding:2px;flex-shrink:0;
  transition:color 0.2s;line-height:0;
}
.attach-btn:hover{color:var(--orange);}
.attach-btn svg{display:block;}

.send-btn{
  width:42px;height:42px;flex-shrink:0;
  background:var(--orange);border:none;border-radius:50%;
  color:#000;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:background 0.2s,transform 0.1s,box-shadow 0.2s;
  box-shadow:0 3px 12px rgba(255,123,28,0.4);
}
.send-btn:hover{background:#ff9244;box-shadow:0 4px 18px rgba(255,123,28,0.55);}
.send-btn:active{transform:scale(0.93);}

#img-file{display:none;}

/* Day separator */
.day-sep{
  text-align:center;font-size:0.73rem;color:var(--text-muted);
  display:flex;align-items:center;gap:10px;
  font-family:'DM Mono',monospace;margin:4px 0;
}
.day-sep::before,.day-sep::after{content:'';flex:1;height:1px;background:var(--border-soft);}

/* Responsive */
@media(max-width:520px){
  .msg-wrap{max-width:92%;}
  .login-card{padding:24px 18px 20px;}
}
</style>
</head>

// P1 NOTE — Client-side password reality:
// Because this is a purely static HTML file with no server, the password
// and its derived key are necessarily present in the JavaScript that every
// browser downloads. A determined person who downloads the file can read them.
// What the password check still provides:
//   • Casual visitors who land on the page are blocked.
//   • The AES encryption protects messages *in the Firebase database* from
//     anyone who gains read access there without the file.
// To truly hide the password you would need a backend (e.g. a serverless
// function that validates credentials before issuing a Firebase custom token).
//
// To improve resistance to offline key extraction we derive the AES key via
// PBKDF2 (100k iterations, SHA-256) rather than plain string concatenation.
// This does NOT prevent someone who has the source file from finding the key —
// it just makes brute-forcing a different password harder.

const ROOM_PW = "Zelepukin";
const MAX_POKEMON = 151;

// Derive a strong AES key from the room password using PBKDF2
const _pbkdfSalt = CryptoJS.enc.Utf8.parse('ZeleChat_v4_salt_2024');
const ENC_KEY = CryptoJS.PBKDF2(ROOM_PW, _pbkdfSalt, {
  keySize: 256 / 32,
  iterations: 100000,
  hasher: CryptoJS.algo.SHA256
});

const POKEMON = [

function rerollAvatar(){

// ─────────────────────────────────────────────────────────────
//  PASSWORD TOGGLE
// ─────────────────────────────────────────────────────────────
function togglePw(){
  pwVisible = !pwVisible;
  document.getElementById('inp-pw').type = pwVisible ? 'text' : 'password';
  document.getElementById('icon-eye-show').style.display = pwVisible ? 'none' : 'block';

// ─────────────────────────────────────────────────────────────
//  LOGIN
// ─────────────────────────────────────────────────────────────
function doLogin(){
  const name = document.getElementById('inp-name').value.trim();
  const pw   = document.getElementById('inp-pw').value;

  document.getElementById('err-name').style.display = 'none';
  document.getElementById('err-pw').style.display   = 'none';

  let ok = true;
  if(name.length < 2 || name.length > 20){
    document.getElementById('err-name').style.display = 'block'; ok = false;
  }
  if(pw !== ROOM_PW){
    document.getElementById('err-pw').style.display = 'block'; ok = false;
  }
  if(!ok) return;

  const uid = 'u_' + Date.now() + '_' + Math.random().toString(36).slice(2,8);
  me = { uid, name, avId: pickAvId };
  enterChat();
}

// ─────────────────────────────────────────────────────────────
//  ENCRYPTION  (AES-256 with PBKDF2-derived key)
// ─────────────────────────────────────────────────────────────
function enc(text){
  // CryptoJS.AES.encrypt accepts a WordArray key directly
  return CryptoJS.AES.encrypt(text, ENC_KEY, {
    mode: CryptoJS.mode.CBC,
    padding: CryptoJS.pad.Pkcs7
  }).toString();
}
function dec(ct){
  try{
    const b = CryptoJS.AES.decrypt(ct, ENC_KEY, {
      mode: CryptoJS.mode.CBC,
      padding: CryptoJS.pad.Pkcs7
    });
    return b.toString(CryptoJS.enc.Utf8) || '[message]';
  }catch(e){ return '[message]'; }
}

// ─────────────────────────────────────────────────────────────
//  ENTER CHAT
// ─────────────────────────────────────────────────────────────
function enterChat(){
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('chat-screen').style.display  = 'flex';

  const pRef = db.ref('zc/users/' + me.uid);
  pRef.set({ name: me.name, avId: me.avId, ts: Date.now() });
  pRef.onDisconnect().remove();

  setInterval(() => pRef.update({ ts: Date.now() }), 25000);

  checkReset();
  listenMessages();
  listenUsers();

  const ta = document.getElementById('msg-input');
  ta.addEventListener('keydown', e => {
    if(e.key === 'Enter' && !e.shiftKey){ e.preventDefault(); sendMsg(); }
    if(e.key === 'Escape'){ if(editCtx) cancelEdit(); else cancelReply(); }
  });
  ta.addEventListener('input', autoResize);
  ta.addEventListener('paste', handlePaste);

  document.addEventListener('click', e => {
    if(!document.querySelector('.users-panel').contains(e.target))
      document.getElementById('users-dd').classList.remove('open');
  });
}

// ─────────────────────────────────────────────────────────────
//  DAILY RESET — 3 AM America/New_York (DST-aware)
// ─────────────────────────────────────────────────────────────

// FIX P2: Use toLocaleString with explicit IANA timezone so we correctly
// follow Eastern Standard Time (UTC-5) AND Eastern Daylight Time (UTC-4).
// The old approach pinned UTC-5 year-round, drifting by 1 h during DST.
function get3amNYThreshold(){
  const now = new Date();
  // Parse "what time is it right now in New York" — this respects DST
  const nyNow = new Date(now.toLocaleString('en-US', { timeZone: 'America/New_York' }));
  // Build a Date representing 3:00:00 AM today in NY wall-clock time
  const ny3am = new Date(nyNow);
  ny3am.setHours(3, 0, 0, 0);
  // Recover UTC ms: the wall-clock offset = now(UTC) - nyNow(UTC-based parse)
  const offsetMs = now.getTime() - nyNow.getTime();
  return ny3am.getTime() + offsetMs;
}

// FIX P1: Use a Firebase transaction so only ONE client can ever trigger
// the wipe even if multiple browsers load past 3 AM simultaneously.
// A malicious/misconfigured clock can still write a bogus lastReset value,
// but it cannot wipe messages more than once per day because the transaction
// aborts when lastReset is already >= today's threshold.
function checkReset(){
  const metaRef   = db.ref('zc/meta/lastReset');
  const threshold = get3amNYThreshold();
  const now       = Date.now();

  if(now <= threshold) return; // Hasn't reached 3 AM today yet

  metaRef.transaction(lastReset => {
    // Only claim the reset if nobody else already has for this cycle
    if((lastReset || 0) >= threshold) return; // Abort — already done
    return now;                               // Claim it atomically
  }, (error, committed) => {
    if(!error && committed){
      db.ref('zc/messages').remove();
    }
  });
}

// ─────────────────────────────────────────────────────────────
function listenMessages(){
  const ref = db.ref('zc/messages').orderByChild('ts');

  ref.on('child_added', snap => {
    const msg = snap.val();
    msgCache[snap.key] = msg;
    if(!rendered[snap.key]){
      rendered[snap.key] = true;
      appendMsg(snap.key, msg);
      scrollBottom();
    }
  });

  ref.on('child_changed', snap => {
    const msg = snap.val();
    msgCache[snap.key] = msg;
    patchMsg(snap.key, msg);
  });

  ref.on('child_removed', snap => {
    delete msgCache[snap.key];
    delete rendered[snap.key];
    const el = document.getElementById('m-' + snap.key);
    if(el){
      el.style.transition = 'opacity 0.25s';
      el.style.opacity    = '0';
      setTimeout(() => el.remove(), 260);
    }
  });
}

// ─────────────────────────────────────────────────────────────
//  REACTIONS HELPER
// ─────────────────────────────────────────────────────────────
function addReaction(msgId, emoji){
  const ref = db.ref(`zc/messages/${msgId}/reactions/${me.uid}`);
  ref.once('value', snap => {
    if(snap.val() === emoji) ref.remove(); // Toggle off if clicked again
    else ref.set(emoji);
  });
}

function buildReactionsHtml(msgId, reactions){
  if(!reactions) return '';
  const counts = {};
  const userReacted = {};
  for(const [uid, emoji] of Object.entries(reactions)){
    counts[emoji] = (counts[emoji] || 0) + 1;
    if(uid === me.uid) userReacted[emoji] = true;
  }
  let html = '<div class="reactions-row">';
  for(const [emoji, count] of Object.entries(counts)){
    const cls = userReacted[emoji] ? 'react-badge reacted' : 'react-badge';
    html += `<div class="${cls}" onclick="addReaction('${msgId}', '${emoji}')">${emoji} <span class="rcount">${count}</span></div>`;
  }
  html += '</div>';
  return html;
}

// ─────────────────────────────────────────────────────────────
//  RENDER A MESSAGE
// ─────────────────────────────────────────────────────────────
function appendMsg(id, msg){
  const area = document.getElementById('msgs');
  const mine = msg.uid === me.uid;
  const text = msg.isImg ? null : dec(msg.text);

  const d       = new Date(msg.ts);
  const timeStr = d.toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' });

  let rqHtml = '';
  if(msg.rply){
    const preview = msg.rply.isImg ? '📷 Image' : dec(msg.rply.text || '').slice(0, 60);
    rqHtml = `<div class="rq">
      <div class="rq-who">${xss(msg.rply.name)}</div>
      <div class="rq-preview">${xss(preview)}</div>
    </div>`;
  }

  let body;
  if(msg.isImg){
    // FIX P1: Validate URL before inserting into DOM to prevent XSS.
    // Only data:image/ and https:// are legitimate values we write.
    const safeSrc = safeImgUrl(msg.text);
    if(safeSrc){
      // Store URL in a data-attribute; onclick handler reads it safely
      body = `<img class="chat-img" src="${xss(safeSrc)}" alt="image" data-imgsrc="${xss(safeSrc)}" onclick="openImg(this)">`;
    } else {
      body = `<span style="opacity:0.5;font-size:0.82rem;">[invalid image]</span>`;
    }
  } else {
    body = xss(text).replace(/\n/g, '<br>');
  }

  const edited = msg.edited ? '<span class="edited-tag">(edited)</span>' : '';

  const threeDotsIcon = `<svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
    <circle cx="5" cy="12" r="2"/><circle cx="12" cy="12" r="2"/><circle cx="19" cy="12" r="2"/>
  </svg>`;
  const replyIcon = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="9 17 4 12 9 7"/><path d="M20 18v-2a4 4 0 0 0-4-4H4"/>
  </svg>`;
  const editIcon = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
    <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
  </svg>`;
  const trashIcon = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="3 6 5 6 21 6"/>
    <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
    <path d="M10 11v6"/><path d="M14 11v6"/>
    <path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
  </svg>`;

  let actionsInner = `
    <div style="display:flex; gap:6px; padding:4px; border-bottom:1px solid var(--border-soft); margin-bottom:4px; justify-content:center; flex-wrap:wrap; max-width:180px;">
      <span class="emoji-btn" onclick="addReaction('${id}','👍')">👍</span>
      <span class="emoji-btn" onclick="addReaction('${id}','❤️')">❤️</span>
      <span class="emoji-btn" onclick="addReaction('${id}','😂')">😂</span>
      <span class="emoji-btn" onclick="addReaction('${id}','😮')">😮</span>
      <span class="emoji-btn" onclick="expandEmojis(this, '${id}')" title="More emojis">➕</span>
    </div>
    <button class="bact" onclick="startReply('${id}')">${replyIcon} Reply</button>`;
  
  if(mine && !msg.isImg){
    actionsInner += `<button class="bact" onclick="startEdit('${id}')">${editIcon} Edit</button>`;
  }
  if(mine){
    actionsInner += `<button class="bact del" onclick="delMsg('${id}')">${trashIcon} Delete</button>`;
  }

  const wrap = document.createElement('div');
  wrap.className = 'msg-wrap ' + (mine ? 'mine' : 'theirs');
  wrap.id = 'm-' + id;
  wrap.innerHTML = `
    <div class="msg-av"><img src="${spriteUrl(msg.avId)}" alt=""></div>
    <div class="msg-col">
      <div class="msg-meta">
        <span class="uname">${xss(msg.name)}</span>
        <span>${timeStr}</span>
      </div>
      <div class="msg-bubble" id="b-${id}">
        <button class="bubble-trigger"
          onmouseenter="this.classList.add('active')"
          onmouseleave="this.classList.remove('active')"
          onclick="this.classList.toggle('active')"
          aria-label="Message options">${threeDotsIcon}</button>
        <div class="bubble-actions">${actionsInner}</div>
        ${rqHtml}
        <span class="btext">${body}</span>${edited}
        <div class="rx-container">${buildReactionsHtml(id, msg.reactions)}</div>
      </div>
    </div>`;

  area.appendChild(wrap);
}

function patchMsg(id, msg){
  const bub = document.getElementById('b-' + id);
  if(!bub) return;
  const bt = bub.querySelector('.btext');
  if(bt){
    if(msg.isImg){
      const safeSrc = safeImgUrl(msg.text);
      if(safeSrc){
        bt.innerHTML = `<img class="chat-img" src="${xss(safeSrc)}" alt="image" data-imgsrc="${xss(safeSrc)}" onclick="openImg(this)">`;
      } else {
        bt.innerHTML = `<span style="opacity:0.5;font-size:0.82rem;">[invalid image]</span>`;
      }
    } else {
      bt.innerHTML = xss(dec(msg.text)).replace(/\n/g, '<br>');
    }
  }
  let et = bub.querySelector('.edited-tag');
  if(msg.edited && !et){
    const s = document.createElement('span');
    s.className = 'edited-tag'; s.textContent = '(edited)';
    const rx = bub.querySelector('.rx-container');
    bub.insertBefore(s, rx);
  }
  const rxContainer = bub.querySelector('.rx-container');
  if(rxContainer){
    rxContainer.innerHTML = buildReactionsHtml(id, msg.reactions);
  }
}

// ─────────────────────────────────────────────────────────────
//  SEND
// ─────────────────────────────────────────────────────────────
function sendMsg(){
  const ta   = document.getElementById('msg-input');
  const text = ta.value.trim();

  if(editCtx){
    if(!text) return;
    const editId = editCtx.id;
    cancelEdit();
    ta.value = ''; autoResize();
    // FIX P2: Use a transaction so we never recreate a message that was
    // deleted between the time the user opened the editor and pressed Save.
    // If the record is null (deleted), the transaction aborts silently.
    db.ref('zc/messages/' + editId).transaction(current => {
      if(current === null) return; // Abort — message was deleted
      return Object.assign({}, current, { text: enc(text), edited: true });
    });
    return;
  }

  if(!text) return;

  const rply = replyCtx ? {
    name:  replyCtx.name,
    text:  replyCtx.isImg ? null : replyCtx.encText,
    isImg: replyCtx.isImg || false
  } : null;

  db.ref('zc/messages').push({
    uid:   me.uid,
    name:  me.name,
    avId:  me.avId,
    text:  enc(text),
    ts:    Date.now(),
    isImg: false,
    edited:false,
    rply
  });

  ta.value = ''; autoResize(); cancelReply();
}

// ─────────────────────────────────────────────────────────────
//  IMAGE / GIF
// ─────────────────────────────────────────────────────────────
function handleImg(e){
  const file = e.target.files[0];
  if(!file) return;
  processAndSend(file);
  e.target.value = '';
}

function handlePaste(e){
  const items = e.clipboardData?.items;
  if(!items) return;
  for(const item of items){
    if(item.type.startsWith('image/')){
      e.preventDefault();
      processAndSend(item.getAsFile());
      return;
    }
  }
}

// FIX P2: GIF files are skipped past the canvas step so animation is preserved.
// Only static images (jpeg/png/webp/etc.) go through canvas compression.
function processAndSend(file){
  const reader = new FileReader();
  reader.onload = ev => {
    if(file.type === 'image/gif'){
      // Send GIF data URL directly — no canvas re-encode (would destroy animation)
      dispatchImageMsg(ev.target.result);
    } else {
      // Compress static images to max 600 px wide, JPEG 75 %
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        const maxW   = 600;
        const scale  = img.width > maxW ? maxW / img.width : 1;
        canvas.width  = img.width  * scale;
        canvas.height = img.height * scale;
        canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
        dispatchImageMsg(canvas.toDataURL('image/jpeg', 0.75));
      };
      img.src = ev.target.result;
    }
  };
  reader.readAsDataURL(file);
}

// FIX P2: Reply metadata now correctly preserves the quoted text when
// replying to a text message with an image (was incorrectly marking text
// replies as isImg:true and dropping the quoted text).
function dispatchImageMsg(dataURL){
  const rply = replyCtx ? {
    name:  replyCtx.name,
    text:  replyCtx.isImg ? null : replyCtx.encText, // keep quoted text if replying to text
    isImg: replyCtx.isImg || false
  } : null;

  db.ref('zc/messages').push({
    uid:   me.uid,
    name:  me.name,
    avId:  me.avId,
    text:  dataURL,
    ts:    Date.now(),
    isImg: true,
    edited:false,
    rply
  });
  cancelReply();
}

// ─────────────────────────────────────────────────────────────
//  REPLY / EDIT / DELETE
// ─────────────────────────────────────────────────────────────
function startReply(id){
  const msg = msgCache[id];
  if(!msg) return;
  replyCtx = { id, name: msg.name, isImg: msg.isImg, encText: msg.text };
  document.getElementById('reply-bar').classList.add('show');
  document.getElementById('rb-who').textContent  = msg.name;
  document.getElementById('rb-prev').textContent = msg.isImg ? '📷 Image' : dec(msg.text).slice(0, 70);
  document.getElementById('msg-input').focus();
}

function cancelReply(){
  replyCtx = null;
  document.getElementById('reply-bar').classList.remove('show');
}

function startEdit(id){
  const msg = msgCache[id];
  if(!msg || msg.isImg) return;
  if(msg.uid !== me.uid) return;
  editCtx = { id };
  const ta = document.getElementById('msg-input');
  ta.value = dec(msg.text);
  ta.focus(); autoResize();
  document.getElementById('edit-bar').classList.add('show');
  cancelReply();
}

function cancelEdit(){
  editCtx = null;
  document.getElementById('edit-bar').classList.remove('show');
  document.getElementById('msg-input').value = '';
  autoResize();
}

function delMsg(id){
  const msg = msgCache[id];
  if(!msg || msg.uid !== me.uid) return;
  if(confirm('Delete this message for everyone?'))
    db.ref('zc/messages/' + id).remove();
}

// ─────────────────────────────────────────────────────────────
//  SECURITY HELPERS
// ─────────────────────────────────────────────────────────────

// FIX P1: Only allow data:image/ blobs (what we generate) and https:// URLs.
// Blocks javascript: / data:text/ / vbscript: etc. that could run code.
function safeImgUrl(src){
  if(typeof src !== 'string') return null;
  if(src.startsWith('data:image/')) return src;
  if(src.startsWith('https://'))    return src;
  return null;
}

// Safe image opener — reads from the data-attribute set by appendMsg/patchMsg
// so there is no chance of an injected URL reaching window.open.
function openImg(el){
  const src = el.getAttribute('data-imgsrc');
  const safe = safeImgUrl(src);
  if(safe) window.open(safe, '_blank', 'noopener,noreferrer');
}

// ─────────────────────────────────────────────────────────────
//  UTILS
// ─────────────────────────────────────────────────────────────
function xss(s){
  if(!s) return '';
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;')
    .replace(/'/g,'&#039;');
}

function scrollBottom(){
  const a = document.getElementById('msgs');
  requestAnimationFrame(() => { a.scrollTop = a.scrollHeight; });
}

function autoResize(){
  const ta = document.getElementById('msg-input');
  ta.style.height = 'auto';
  ta.style.height = Math.min(ta.scrollHeight, 110) + 'px';
}
