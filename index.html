<!DOCTYPE html>
<html lang="en" data-theme="zelechat">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Zelechat · Whyhockey</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>

<style>
/* ═══════════════════════════════════════════════════════════
   DESIGN TOKENS
═══════════════════════════════════════════════════════════ */
:root {
  /* Surfaces */
  --s0: #06060c;
  --s1: #0f0f18;
  --s2: #171724;
  --s3: #1f1f2e;
  --s4: #272738;

  /* Text */
  --tx:    #edeae2;
  --tx-2:  #9e9890;
  --tx-3:  #545262;

  /* Borders */
  --br:    rgba(255,255,255,0.07);
  --br-2:  rgba(255,255,255,0.12);

  /* Semantic */
  --green:  #3ddc84;
  --red:    #ff4f4f;
  --purple: #9b78c8;

  /* Accent — overridden by [data-theme] */
  --ac:     #ff7b1c;
  --ac-lo:  rgba(255,123,28,0.10);
  --ac-mid: rgba(255,123,28,0.18);
  --ac-hi:  rgba(255,123,28,0.28);
  --ac-tx:  #ffac6a;

  --radius: 14px;
  --shadow: 0 8px 32px rgba(0,0,0,0.65);
}

[data-theme="whyhockey"] {
  --ac:     #c5203b;
  --ac-lo:  rgba(197,32,59,0.10);
  --ac-mid: rgba(197,32,59,0.18);
  --ac-hi:  rgba(197,32,59,0.28);
  --ac-tx:  #e87585;
}

/* ═══════════════════════════════════════════════════════════
   RESET
═══════════════════════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }

body {
  font-family: 'DM Sans', sans-serif;
  font-size: 16px;
  background: var(--s0);
  color: var(--tx);
  height: 100dvh;
  display: flex;
  flex-direction: column;
}

::-webkit-scrollbar          { width: 3px; height: 3px; }
::-webkit-scrollbar-track    { background: transparent; }
::-webkit-scrollbar-thumb    { background: var(--br-2); border-radius: 3px; }

/* ═══════════════════════════════════════════════════════════
   SCREEN SYSTEM
═══════════════════════════════════════════════════════════ */
.screen { display: none; flex: 1; flex-direction: column; }
.screen.active { display: flex; }

/* ═══════════════════════════════════════════════════════════
   ①  SELECTOR SCREEN
═══════════════════════════════════════════════════════════ */
#sel-screen {
  align-items: center;
  justify-content: center;
  padding: 28px 20px;
  overflow-y: auto;
  background:
    radial-gradient(ellipse 90% 70% at 10% 50%,  rgba(255,123,28,0.08) 0%, transparent 55%),
    radial-gradient(ellipse 90% 70% at 90% 50%,  rgba(197,32,59,0.07)  0%, transparent 55%),
    var(--s0);
}

.sel-container {
  width: 100%;
  max-width: 660px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 36px;
}

.sel-wordmark {
  text-align: center;
}
.sel-wordmark h1 {
  font-family: 'Syne', sans-serif;
  font-size: clamp(2rem, 5vw, 2.8rem);
  font-weight: 800;
  color: var(--ac);
  letter-spacing: -0.03em;
  line-height: 1;
  text-shadow: 0 0 48px var(--ac-hi);
  margin-bottom: 8px;
}
.sel-wordmark p {
  font-size: 0.73rem;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--tx-3);
}

.sel-cards {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 18px;
  width: 100%;
}

.sel-card {
  position: relative;
  border-radius: 22px;
  overflow: hidden;
  cursor: pointer;
  border: 1.5px solid var(--br);
  background: var(--s1);
  min-height: 260px;
  display: flex;
  flex-direction: column;
  transition: transform 0.24s cubic-bezier(.22,.68,0,1.2),
              border-color 0.22s,
              box-shadow 0.22s;
  box-shadow: 0 4px 28px rgba(0,0,0,0.5);
}
.sel-card:active { transform: scale(0.97); }

.sel-card.flyers:hover {
  transform: translateY(-6px);
  border-color: rgba(255,123,28,0.5);
  box-shadow: 0 16px 40px rgba(255,123,28,0.18), 0 4px 16px rgba(0,0,0,0.6);
}
.sel-card.panthers:hover {
  transform: translateY(-6px);
  border-color: rgba(197,32,59,0.5);
  box-shadow: 0 16px 40px rgba(197,32,59,0.18), 0 4px 16px rgba(0,0,0,0.6);
}

/* Card art area */
.sel-art {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
  min-height: 170px;
}
.sel-card.flyers .sel-art {
  background:
    radial-gradient(ellipse 60% 60% at 50% 60%, rgba(255,123,28,0.22) 0%, transparent 65%),
    linear-gradient(160deg, #180900 0%, #0c0808 100%);
}
.sel-card.panthers .sel-art {
  background:
    radial-gradient(ellipse 60% 60% at 50% 60%, rgba(197,32,59,0.20) 0%, transparent 65%),
    linear-gradient(160deg, #14000a 0%, #07060f 100%);
}

.sel-art-emoji {
  font-size: 5rem;
  line-height: 1;
  filter: drop-shadow(0 6px 20px rgba(0,0,0,0.7));
  transition: transform 0.24s;
}
.sel-card:hover .sel-art-emoji { transform: scale(1.08); }

/* Ice texture overlay */
.sel-art::after {
  content: '';
  position: absolute;
  inset: 0;
  background: repeating-linear-gradient(
    -45deg,
    transparent 0px,
    transparent 18px,
    rgba(255,255,255,0.012) 18px,
    rgba(255,255,255,0.012) 19px
  );
  pointer-events: none;
}

/* Card footer */
.sel-foot {
  padding: 16px 18px 18px;
  background: var(--s2);
  border-top: 1px solid var(--br);
}
.sel-team {
  font-family: 'Syne', sans-serif;
  font-size: 1rem;
  font-weight: 800;
  line-height: 1.1;
  margin-bottom: 3px;
}
.sel-card.flyers  .sel-team { color: #ff9450; }
.sel-card.panthers .sel-team { color: #e87585; }
.sel-room {
  font-size: 0.68rem;
  color: var(--tx-3);
  font-family: 'DM Mono', monospace;
  letter-spacing: 0.1em;
  text-transform: uppercase;
}

/* ═══════════════════════════════════════════════════════════
   ②  LOGIN SCREEN
═══════════════════════════════════════════════════════════ */
#login-screen {
  align-items: center;
  justify-content: center;
  padding: 16px;
  overflow-y: auto;
  position: relative;
}
#login-screen::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse 65% 45% at 50% 105%, var(--ac-hi) 0%, transparent 60%);
  pointer-events: none;
}

.login-card {
  position: relative;
  width: 100%;
  max-width: 420px;
  background: var(--s1);
  border: 1px solid var(--br-2);
  border-radius: 24px;
  padding: 34px 30px 28px;
  box-shadow: var(--shadow), 0 0 60px var(--ac-lo);
}

.login-hd {
  text-align: center;
  margin-bottom: 6px;
}
.login-room-icon { font-size: 2rem; line-height: 1; display: block; margin-bottom: 6px; }
.login-room-name {
  font-family: 'Syne', sans-serif;
  font-size: 2rem;
  font-weight: 800;
  color: var(--ac);
  letter-spacing: -0.02em;
  text-shadow: 0 0 28px var(--ac-hi);
}
.login-tagline {
  font-size: 0.73rem;
  color: var(--tx-3);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  text-align: center;
  margin-bottom: 28px;
}

/* Avatar picker */
.av-picker {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  margin-bottom: 26px;
}
.av-ring {
  width: 96px;
  height: 96px;
  border-radius: 50%;
  border: 2px solid var(--ac);
  background: var(--s2);
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  cursor: pointer;
  box-shadow: 0 0 22px var(--ac-mid), inset 0 0 12px rgba(0,0,0,0.35);
  transition: box-shadow 0.22s;
}
.av-ring:hover { box-shadow: 0 0 36px var(--ac-hi), inset 0 0 12px rgba(0,0,0,0.35); }
.av-ring img { width: 82px; height: 82px; image-rendering: pixelated; }
.av-label { font-size: 0.74rem; color: var(--tx-2); font-family: 'DM Mono', monospace; }
.btn-reroll {
  background: none;
  border: 1px solid var(--br-2);
  border-radius: 20px;
  color: var(--tx-2);
  padding: 5px 16px;
  font-size: 0.8rem;
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  display: flex;
  align-items: center;
  gap: 6px;
  transition: all 0.18s;
}
.btn-reroll:hover { border-color: var(--ac); color: var(--ac); }

/* Form fields */
.field { margin-bottom: 16px; }
.field label {
  display: block;
  font-size: 0.71rem;
  text-transform: uppercase;
  letter-spacing: 0.11em;
  color: var(--tx-3);
  margin-bottom: 7px;
}
.field input {
  width: 100%;
  background: var(--s2);
  border: 1px solid var(--br);
  border-radius: 11px;
  color: var(--tx);
  padding: 12px 15px;
  font-size: 1rem;
  font-family: 'DM Sans', sans-serif;
  outline: none;
  transition: border-color 0.18s, box-shadow 0.18s;
}
.field input:focus {
  border-color: var(--ac);
  box-shadow: 0 0 0 3px var(--ac-lo);
}
.field input::placeholder { color: var(--tx-3); }
.field-err {
  display: none;
  font-size: 0.79rem;
  color: var(--red);
  margin-top: 5px;
}

.btn-enter {
  width: 100%;
  background: var(--ac);
  border: none;
  border-radius: 11px;
  color: #000;
  font-weight: 700;
  font-size: 1.05rem;
  font-family: 'DM Sans', sans-serif;
  padding: 13px;
  cursor: pointer;
  margin-top: 6px;
  box-shadow: 0 4px 18px var(--ac-mid);
  transition: opacity 0.18s, transform 0.1s;
}
.btn-enter:hover  { opacity: 0.88; }
.btn-enter:active { transform: scale(0.97); }

.btn-back-link {
  display: block;
  text-align: center;
  color: var(--tx-3);
  font-size: 0.82rem;
  cursor: pointer;
  padding: 12px 0 0;
  background: none;
  border: none;
  font-family: 'DM Sans', sans-serif;
  width: 100%;
  transition: color 0.15s;
}
.btn-back-link:hover { color: var(--tx); }

/* ═══════════════════════════════════════════════════════════
   ③  CHAT SCREEN
═══════════════════════════════════════════════════════════ */
#chat-screen { height: 100dvh; overflow: hidden; }

/* ── Header ── */
.chat-header {
  background: var(--s1);
  border-bottom: 1px solid var(--br-2);
  padding: 10px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
  z-index: 20;
  box-shadow: 0 2px 14px rgba(0,0,0,0.45);
}
.hdr-l { display: flex; align-items: center; gap: 11px; }
.hdr-room-icon { font-size: 1.7rem; line-height: 1; }
.hdr-room-name {
  font-family: 'Syne', sans-serif;
  font-size: 1.2rem;
  font-weight: 800;
  color: var(--ac);
  letter-spacing: -0.01em;
  line-height: 1.1;
}
.hdr-room-tag { font-size: 0.63rem; color: var(--tx-3); font-family: 'DM Mono', monospace; }
.hdr-r { display: flex; align-items: center; gap: 7px; }

.hdr-btn {
  background: var(--s2);
  border: 1px solid var(--br);
  border-radius: 20px;
  color: var(--tx);
  padding: 6px 12px;
  font-size: 0.82rem;
  font-family: 'DM Sans', sans-serif;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 6px;
  white-space: nowrap;
  transition: border-color 0.18s;
  line-height: 1;
}
.hdr-btn:hover { border-color: var(--ac); }
.hdr-btn.icon-only { padding: 7px 9px; }

.green-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--green);
  box-shadow: 0 0 6px var(--green);
  flex-shrink: 0;
}
.online-count { color: var(--ac); font-weight: 600; }

/* Users dropdown */
.users-panel { position: relative; }
.users-dropdown {
  display: none;
  position: absolute;
  top: calc(100% + 8px);
  right: 0;
  background: var(--s1);
  border: 1px solid var(--br-2);
  border-radius: var(--radius);
  padding: 10px;
  min-width: 210px;
  max-height: 300px;
  overflow-y: auto;
  z-index: 200;
  box-shadow: var(--shadow);
  animation: pop-in 0.14s ease;
}
.users-dropdown.open { display: block; }
@keyframes pop-in {
  from { opacity: 0; transform: translateY(-6px) scale(0.97); }
  to   { opacity: 1; transform: translateY(0)    scale(1); }
}
.dd-heading {
  font-size: 0.67rem;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--tx-3);
  padding-bottom: 8px;
  border-bottom: 1px solid var(--br);
  margin-bottom: 7px;
}
.user-row {
  display: flex;
  align-items: center;
  gap: 9px;
  padding: 5px 5px;
  border-radius: 8px;
  transition: background 0.14s;
}
.user-row:hover { background: var(--s2); }
.user-row img {
  width: 30px; height: 30px;
  border-radius: 50%;
  image-rendering: pixelated;
  background: var(--s2);
  border: 1px solid var(--br);
  flex-shrink: 0;
}
.user-row .uname { font-size: 0.86rem; }
.user-row .you   { color: var(--tx-3); font-size: 0.74rem; }

/* ── Messages container ── */
.msgs-container { flex: 1; position: relative; overflow: hidden; min-height: 0; }
.msgs {
  position: absolute;
  inset: 0;
  overflow-y: auto;
  padding: 16px 16px 10px;
  display: flex;
  flex-direction: column;
  gap: 13px;
}

/* Scroll FAB */
.scroll-fab {
  position: absolute;
  bottom: 14px; right: 14px;
  background: var(--ac);
  color: #000;
  border: none;
  border-radius: 22px;
  padding: 8px 14px;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.8rem;
  font-weight: 700;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 5px;
  opacity: 0;
  pointer-events: none;
  transform: translateY(8px);
  transition: opacity 0.2s, transform 0.2s;
  z-index: 10;
  box-shadow: 0 4px 16px rgba(0,0,0,0.4);
}
.scroll-fab.visible { opacity: 1; pointer-events: auto; transform: translateY(0); }

/* Empty state */
.empty-state {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 10px;
  color: var(--tx-3);
  user-select: none;
  pointer-events: none;
}
.empty-state-icon { font-size: 2.8rem; }

/* ── Message rows ── */
.msg-row {
  display: flex;
  gap: 9px;
  max-width: 82%;
  animation: msg-in 0.18s ease;
}
@keyframes msg-in {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}
.msg-row.mine    { align-self: flex-end;  flex-direction: row-reverse; }
.msg-row.theirs  { align-self: flex-start; }

.msg-avatar {
  width: 40px; height: 40px;
  border-radius: 50%;
  background: var(--s2);
  flex-shrink: 0;
  align-self: flex-end;
  overflow: hidden;
  border: 1px solid var(--br);
}
.msg-avatar img { width: 100%; height: 100%; image-rendering: pixelated; }

.msg-body { display: flex; flex-direction: column; gap: 3px; min-width: 0; }
.msg-row.mine   .msg-body { align-items: flex-end; }
.msg-row.theirs .msg-body { align-items: flex-start; }

.msg-meta {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 0.72rem;
  color: var(--tx-3);
  font-family: 'DM Mono', monospace;
  padding: 0 4px;
}
.msg-row.mine .msg-meta { flex-direction: row-reverse; }
.msg-meta .sender { font-family: 'DM Sans', sans-serif; font-weight: 600; color: var(--ac-tx); font-size: 0.78rem; }

/* Reply quote */
.rq {
  border-left: 3px solid var(--purple);
  background: rgba(155,120,200,0.1);
  border-radius: 0 7px 7px 0;
  padding: 4px 10px;
  margin-bottom: 5px;
  font-size: 0.8rem;
}
.msg-row.mine .rq { border-left-color: rgba(0,0,0,0.25); background: rgba(0,0,0,0.12); }
.rq-who  { font-weight: 600; font-size: 0.75rem; margin-bottom: 1px; }
.rq-text { opacity: 0.65; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; max-width: 220px; }

/* Bubble */
.bubble {
  position: relative;
  background: var(--s2);
  border: 1px solid var(--br);
  border-radius: 16px;
  padding: 10px 42px 10px 14px;
  font-size: 1rem;
  line-height: 1.62;
  word-break: break-word;
}
.msg-row.mine .bubble {
  background: var(--ac);
  color: #000;
  border-color: transparent;
  border-bottom-right-radius: 4px;
  padding-right: 42px;
}
.msg-row.theirs .bubble { border-bottom-left-radius: 4px; }

.edited-tag { font-size: 0.65rem; opacity: 0.45; font-style: italic; margin-left: 5px; }

/* Bubble trigger button */
.bubble-trigger {
  position: absolute;
  top: 7px; right: 7px;
  width: 26px; height: 26px;
  border-radius: 50%;
  background: transparent;
  border: none;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  transition: opacity 0.15s, background 0.15s;
  color: var(--ac);
  font-size: 0.9rem;
  letter-spacing: -1px;
  z-index: 4;
  padding: 0;
}
.msg-row.mine .bubble-trigger { color: rgba(0,0,0,0.5); }
.bubble:hover .bubble-trigger,
.bubble-trigger:focus,
.bubble-trigger.open { opacity: 1; }
.bubble-trigger:hover { background: rgba(255,255,255,0.1); }
.msg-row.mine .bubble-trigger:hover { background: rgba(0,0,0,0.12); }

/* Actions popup */
.bubble-actions {
  display: none;
  position: absolute;
  bottom: calc(100% + 5px);
  background: var(--s1);
  border: 1px solid var(--br-2);
  border-radius: 13px;
  padding: 8px;
  z-index: 30;
  box-shadow: 0 6px 26px rgba(0,0,0,0.7);
  min-width: 186px;
  flex-direction: column;
  gap: 2px;
  animation: pop-in 0.1s ease;
}
.msg-row.mine   .bubble-actions { right: 0; }
.msg-row.theirs .bubble-actions { left: 0; }
.bubble-actions.open { display: flex; }

.react-strip {
  display: flex;
  gap: 2px;
  padding: 3px 3px 8px;
  border-bottom: 1px solid var(--br);
  margin-bottom: 5px;
  flex-wrap: wrap;
}
.react-strip span {
  font-size: 1.1rem;
  cursor: pointer;
  padding: 4px 5px;
  border-radius: 6px;
  transition: background 0.1s;
  line-height: 1;
}
.react-strip span:hover { background: var(--s2); }

.act {
  display: flex;
  align-items: center;
  gap: 8px;
  background: none;
  border: none;
  cursor: pointer;
  color: var(--tx-2);
  padding: 7px 9px;
  border-radius: 8px;
  font-size: 0.82rem;
  font-family: 'DM Sans', sans-serif;
  transition: all 0.14s;
  width: 100%;
  text-align: left;
}
.act:hover { color: var(--ac); background: var(--ac-lo); }
.act.del:hover { color: var(--red); background: rgba(255,79,79,0.1); }

/* Reaction badges */
.rx-row { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 4px; }
.rx-pill {
  display: flex;
  align-items: center;
  gap: 3px;
  background: var(--s1);
  border: 1px solid var(--br);
  border-radius: 12px;
  padding: 2px 8px;
  font-size: 0.79rem;
  cursor: pointer;
  transition: all 0.14s;
  font-family: 'DM Mono', monospace;
}
.rx-pill:hover { border-color: var(--ac); }
.rx-pill.active { background: var(--ac-lo); border-color: var(--ac); }
.rx-pill .cnt { color: var(--tx-2); font-size: 0.73rem; }

/* ── Context bar (reply/edit) ── */
.ctx-bar {
  display: none;
  background: var(--s1);
  border-top: 1px solid var(--br-2);
  padding: 8px 16px;
  align-items: center;
  gap: 10px;
  font-size: 0.83rem;
  flex-shrink: 0;
  animation: slide-up 0.13s ease;
}
.ctx-bar.show { display: flex; }
@keyframes slide-up {

  to   { opacity: 1; transform: translateY(0); }

.ctx-icon  { color: var(--purple); font-size: 1rem; flex-shrink: 0; }
.ctx-label { color: var(--ac); font-weight: 600; flex-shrink: 0; }
.ctx-prev  { color: var(--tx-2); flex: 1; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
.ctx-close {
  background: none; border: none; cursor: pointer;
  color: var(--tx-3); padding: 3px 7px; font-size: 1rem;
  flex-shrink: 0; line-height: 1;
  transition: color 0.14s;
}
.ctx-close:hover { color: var(--ac); }

/* ── Typing bar ── */
.typing-bar {
  padding: 0 16px;
  min-height: 22px;
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 0.75rem;
  color: var(--tx-3);
  flex-shrink: 0;
}
.typing-dots { display: flex; gap: 3px; align-items: center; }
.typing-dots span {
  width: 5px; height: 5px;
  border-radius: 50%;
  background: var(--tx-3);
  animation: typing-bounce 1.2s ease infinite;
}
.typing-dots span:nth-child(2) { animation-delay: 0.2s; }
.typing-dots span:nth-child(3) { animation-delay: 0.4s; }
@keyframes typing-bounce {
  0%, 80%, 100% { transform: scale(0.6); opacity: 0.35; }
  40%            { transform: scale(1);   opacity: 1; }
}

/* ── Input zone ── */
.input-zone {
  background: var(--s1);
  border-top: 1px solid var(--br-2);
  padding: 10px 12px;
  display: flex;
  align-items: flex-end;
  gap: 8px;
  flex-shrink: 0;
}

.emoji-wrap { position: relative; flex-shrink: 0; }
.ico-btn {
  background: none; border: none; cursor: pointer;
  color: var(--tx-3); padding: 6px;
  font-size: 1.25rem; line-height: 1;
  transition: color 0.15s;
}
.ico-btn:hover { color: var(--ac); }

/* Emoji panel */

  display: none;
  position: absolute;
  bottom: calc(100% + 8px); left: 0;
  background: var(--s1);
  border: 1px solid var(--br-2);

  z-index: 50;

  background: none; border: none; cursor: pointer;

  ENC_KEY = cfg.encPfx + pw + '_v2';
  const uid = 'u' + Date.now() + Math.random().toString(36).slice(2, 5);
  me = { uid, name, avId: pickAvId };
  enterChat();
}

// ─────────────────────────────────────────────
//  ENTER CHAT
// ─────────────────────────────────────────────
function enterChat() {
  // Update header
  document.getElementById('hdr-icon').textContent = cfg.icon;
  document.getElementById('hdr-name').textContent = cfg.name;
  document.getElementById('hdr-tag').textContent  = cfg.tagline;
  document.getElementById('empty-icon').textContent = cfg.icon;
  document.getElementById('msg-input').placeholder  = 'Message ' + cfg.name + '…';
  updateSwitchBtn();

  showScreen('chat-screen');
  loadSoundPref();
  setupScrollFAB();

  // Register presence
  const pRef = db.ref(cfg.path + '/users/' + me.uid);
  pRef.set({ name: me.name, avId: me.avId, ts: Date.now() });
  pRef.onDisconnect().remove();
  window._presInt = setInterval(() => pRef.update({ ts: Date.now() }), 25000);

  listenMessages();
  listenUsers();
  listenTyping();

  // Input events
  const ta = document.getElementById('msg-input');
  ta.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); return; }
    if (e.key === 'Escape') { clearCtx(); }
    doSetTyping();
  });
  ta.addEventListener('input', () => { autoResize(); doSetTyping(); });
}

// ─────────────────────────────────────────────
//  ENCRYPTION
// ─────────────────────────────────────────────
function enc(t)  {
  if (!ENC_KEY) throw new Error('No key');
  return CryptoJS.AES.encrypt(String(t), ENC_KEY).toString();
}
function dec(ct) {
  if (!ENC_KEY || !ct) return '';
  try {
    const bytes = CryptoJS.AES.decrypt(ct, ENC_KEY);
    return bytes.toString(CryptoJS.enc.Utf8) || '…';
  } catch { return '…'; }
}

// ─────────────────────────────────────────────
//  LISTEN — MESSAGES
// ─────────────────────────────────────────────
function listenMessages() {
  if (_msgRef) _msgRef.off();
  rendered = {}; msgCache = {};
  _initDone = false;
  document.getElementById('msgs').innerHTML = '';
  showEmpty(true);

  _msgRef = db.ref(cfg.path + '/messages').orderByChild('ts').limitToLast(120);

  _msgRef.on('child_added', snap => {
    const msg = snap.val(); if (!msg) return;
    msgCache[snap.key] = msg;
    if (!rendered[snap.key]) {
      rendered[snap.key] = true;
      renderMsg(snap.key, msg);
      scrollToBottom();
      showEmpty(false);
    }
    if (_initDone && msg.uid !== me.uid) {
      playSound();
      newMsgCnt++;
      updateFAB();
    }
  });

  _msgRef.once('value', () => {
    _initDone = true;
    scrollToBottom(true);
  });

  _msgRef.on('child_changed', snap => {
    const msg = snap.val(); if (!msg) return;
    msgCache[snap.key] = msg;
    patchMsg(snap.key, msg);
  });

  _msgRef.on('child_removed', snap => {
    delete msgCache[snap.key];
    delete rendered[snap.key];
    const el = document.getElementById('m-' + snap.key);
    if (el) { el.style.opacity = '0'; el.style.transition = 'opacity 0.2s'; setTimeout(() => el.remove(), 210); }
    showEmpty(Object.keys(rendered).length === 0);
  });
}

function showEmpty(show) {
  const el = document.getElementById('empty-state');
  el.style.display = show ? 'flex' : 'none';
}

// ─────────────────────────────────────────────
//  RENDER — single message
// ─────────────────────────────────────────────
function renderMsg(id, msg) {
  const mine = msg.uid === me.uid;
  const text = dec(msg.text);
  const time = new Date(msg.ts).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

  // Reply quote
  let rqHtml = '';
  if (msg.rply) {
    const preview = dec(msg.rply.text || '').slice(0, 55);
    rqHtml = `<div class="rq">
      <div class="rq-who">${xss(msg.rply.name)}</div>
      <div class="rq-text">${xss(preview)}</div>
    </div>`;
  }

  // Actions popup — reactions + buttons
  const reactHtml = QUICK_REACT
    .map(e => `<span onclick="addReact('${id}','${e}');event.stopPropagation()">${e}</span>`)
    .join('');

  const actHtml = `
    <div class="react-strip">${reactHtml}</div>
    <button class="act" onclick="startReply('${id}');event.stopPropagation()">↩ Reply</button>
    ${mine ? `<button class="act del" onclick="doDelete('${id}');event.stopPropagation()">🗑 Delete</button>` : ''}
  `;

  const editedHtml = msg.edited ? '<span class="edited-tag">(edited)</span>' : '';

  const wrap = document.createElement('div');
  wrap.id = 'm-' + id;
  wrap.className = 'msg-row ' + (mine ? 'mine' : 'theirs');

  wrap.innerHTML = `
    <div class="msg-avatar"><img src="${spriteUrl(msg.avId || 1)}" alt=""></div>
    <div class="msg-body">
      <div class="msg-meta">
        <span class="sender">${xss(msg.name)}</span>
        <span>${time}</span>
      </div>
      <div class="bubble" id="b-${id}">
        <button class="bubble-trigger" id="bt-${id}"
          onclick="toggleActions('${id}',event)"
          aria-label="Message options">···</button>
        <div class="bubble-actions" id="ba-${id}">${actHtml}</div>
        ${rqHtml}
        <span class="btext">${xss(text).replace(/\n/g, '<br>')}</span>${editedHtml}
      </div>
      <div class="rx-row" id="rx-${id}">${buildRxHtml(id, msg.reactions)}</div>
    </div>`;

  document.getElementById('msgs').appendChild(wrap);
}

function patchMsg(id, msg) {
  const bt = document.querySelector('#b-' + id + ' .btext');
  if (bt) bt.innerHTML = xss(dec(msg.text)).replace(/\n/g, '<br>');

  const et = document.querySelector('#b-' + id + ' .edited-tag');
  if (msg.edited && !et) {
    const s = document.createElement('span');
    s.className = 'edited-tag'; s.textContent = '(edited)';
    document.getElementById('b-' + id)?.appendChild(s);
  }

  const rx = document.getElementById('rx-' + id);
  if (rx) rx.innerHTML = buildRxHtml(id, msg.reactions);
}

function buildRxHtml(msgId, reactions) {
  if (!reactions) return '';
  const counts = {}, myReact = {};
  Object.entries(reactions).forEach(([uid, e]) => {
    counts[e] = (counts[e] || 0) + 1;
    if (uid === me.uid) myReact[e] = true;
  });
  return Object.entries(counts).map(([e, c]) =>
    `<div class="rx-pill${myReact[e] ? ' active' : ''}"
      onclick="addReact('${msgId}','${e}')">${e}<span class="cnt">${c}</span></div>`
  ).join('');
}

// ─────────────────────────────────────────────
//  MESSAGE ACTIONS
// ─────────────────────────────────────────────
function toggleActions(id, e) {
  e.stopPropagation();
  const ba = document.getElementById('ba-' + id);
  const bt = document.getElementById('bt-' + id);
  const isOpen = ba.classList.contains('open');
  closeAllActions();
  if (!isOpen) {
    ba.classList.add('open');
    bt.classList.add('open');
  }
}

function closeAllActions() {
  document.querySelectorAll('.bubble-actions.open').forEach(el => el.classList.remove('open'));
  document.querySelectorAll('.bubble-trigger.open').forEach(el => el.classList.remove('open'));
}

function startReply(id) {
  const msg = msgCache[id]; if (!msg) return;
  replyCtx = { id, name: msg.name, encText: msg.text };
  document.getElementById('ctx-label').textContent = 'Replying to ' + msg.name;
  document.getElementById('ctx-prev').textContent  = dec(msg.text).slice(0, 60);
  document.getElementById('ctx-bar').classList.add('show');
  closeAllActions();
  document.getElementById('msg-input').focus();
}

function clearCtx() {
  replyCtx = null;
  document.getElementById('ctx-bar').classList.remove('show');
}

function addReact(msgId, emoji) {
  const ref = db.ref(`${cfg.path}/messages/${msgId}/reactions/${me.uid}`);
  ref.once('value', snap => {
    if (snap.val() === emoji) ref.remove();
    else ref.set(emoji);
  });
  closeAllActions();
}

function doDelete(id) {
  db.ref(cfg.path + '/messages/' + id).remove();
  closeAllActions();
}

// ─────────────────────────────────────────────
//  SEND
// ─────────────────────────────────────────────
async function sendMsg() {
  const ta   = document.getElementById('msg-input');
  const text = ta.value.trim();
  if (!text) return;

  // Bot commands
  if (text.startsWith('@NHL')) {
    ta.value = ''; autoResize(); clearCtx(); clearTypingStatus();
    handleNHLCmd(text.slice(4).trim());
    return;
  }

  const rply = replyCtx
    ? { name: replyCtx.name, text: replyCtx.encText }
    : null;

  ta.value = ''; autoResize(); clearCtx(); clearTypingStatus();
  newMsgCnt = 0; updateFAB();

  let encText;
  try { encText = enc(text); } catch { showToast('Encryption error — please refresh.'); ta.value = text; return; }

  try {
    await db.ref(cfg.path + '/messages').push({
      uid: me.uid, name: me.name, avId: me.avId,
      text: encText,
      ts:   Date.now(),
      edited: false,
      rply
    });
  } catch (err) {
    ta.value = text; autoResize();
    showToast(err.code === 'PERMISSION_DENIED'
      ? 'Permission denied — check Firebase rules.'
      : 'Send failed: ' + err.message);
  }
}

// ─────────────────────────────────────────────
//  @NHL BOT  (live scores from NHL API)
// ─────────────────────────────────────────────
function postBot(text) {
  const encText = enc(text);
  db.ref(cfg.path + '/messages').push({
    uid: 'nhl-bot', name: 'NHL Bot', avId: 132,
    text: encText, ts: Date.now(), edited: false, rply: null, isBot: true
  });
}

async function handleNHLCmd(sub) {
  sub = sub.toLowerCase().trim();

  if (!sub || sub === 'scores' || sub === 'score') {
    postBot('⏳ Fetching today\'s NHL scores…');
    try {
      const nyStr = new Date().toLocaleString('en-US', { timeZone: 'America/New_York' });
      const ny    = new Date(nyStr);
      if (ny.getHours() < 3) ny.setDate(ny.getDate() - 1);
      const date  = ny.toISOString().slice(0, 10);
      const d     = await fetch('https://api-web.nhle.com/v1/score/' + date).then(r => r.json());
      const games = d.games || [];
      if (!games.length) { postBot('🏒 No games scheduled today.'); return; }
      let out = `🏒 NHL Scores — ${d.currentDate || date}\n${'─'.repeat(28)}\n`;
      for (const g of games) {
        const away = g.awayTeam, home = g.homeTeam;
        const st   = g.gameState || '';
        const fut  = st === 'FUT' || st === 'PRE';
        const fin  = st === 'OFF' || st === 'FINAL';
        const live = st === 'LIVE' || st === 'CRIT';
        const score = fut
          ? new Date(g.startTimeUTC).toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', timeZone: 'America/New_York', timeZoneName: 'short' })
          : `${away.score ?? 0}–${home.score ?? 0}`;
        const tag = live ? ' 🔴 LIVE' : fin ? ' ✓' : '';
        out += `${away.abbrev} @ ${home.abbrev}  ${score}${tag}\n`;
      }
      postBot(out.trim());
    } catch (e) {
      postBot('❌ Could not reach the NHL API. (' + e.message + ')');
    }
    return;
  }

  postBot('🏒 @NHL — shows today\'s scores. Usage: @NHL or @NHL scores');
}

// ─────────────────────────────────────────────
//  LISTEN — USERS (presence)
// ─────────────────────────────────────────────
function listenUsers() {
  if (_usersRef) _usersRef.off();
  _usersRef = db.ref(cfg.path + '/users');
  _usersRef.on('value', snap => {
    const all    = snap.val() || {};
    const now    = Date.now();
    const active = Object.values(all).filter(u => u && u.name && now - (u.ts || 0) < 70000);
    document.getElementById('online-cnt').textContent = active.length;
    document.getElementById('users-list').innerHTML   = active.map(u =>
      `<div class="user-row">
        <img src="${spriteUrl(u.avId || 1)}" alt="">
        <span class="uname">${xss(u.name)}${u.name === me.name ? '<span class="you"> (you)</span>' : ''}</span>
      </div>`
    ).join('');
  });
}

function toggleUsers() {
  document.getElementById('users-dd').classList.toggle('open');
}

// ─────────────────────────────────────────────
//  LISTEN — TYPING
// ─────────────────────────────────────────────
function doSetTyping() {
  if (!me || !cfg) return;
  const ref = db.ref(cfg.path + '/typing/' + me.uid);
  if (!_typActive) {
    _typActive = true;
    ref.set({ name: me.name, ts: Date.now() });
    ref.onDisconnect().remove();
  }
  clearTimeout(_typTimer);
  _typTimer = setTimeout(() => {
    _typActive = false;
    ref.remove();
  }, 4000);
}

function clearTypingStatus() {
  _typActive = false;
  clearTimeout(_typTimer);
  if (me && cfg) db.ref(cfg.path + '/typing/' + me.uid).remove();
}

function listenTyping() {
  if (_typRef) _typRef.off();
  _typRef = db.ref(cfg.path + '/typing');
  _typRef.on('value', snap => {
    const all = snap.val() || {};
    const now = Date.now();
    const who = Object.entries(all)
      .filter(([uid, d]) => uid !== me.uid && now - (d.ts || 0) < 6000)
      .map(([, d]) => d.name);
    const bar = document.getElementById('typing-bar');
    if (!who.length) { bar.innerHTML = ''; return; }
    const label = who.slice(0, 3).map(xss).join(', ') + (who.length === 1 ? ' is typing…' : ' are typing…');
    bar.innerHTML = `<div class="typing-dots"><span></span><span></span><span></span></div><span>${label}</span>`;
  });
}

// ─────────────────────────────────────────────
//  ROOM SWITCHING
// ─────────────────────────────────────────────
function updateSwitchBtn() {
  const other = cfg.id === 'zelechat' ? ROOMS.whyhockey : ROOMS.zelechat;
  document.getElementById('sw-icon').textContent        = other.icon;
  document.getElementById('sw-name').textContent        = other.name;
  document.getElementById('sw-modal-title').textContent = 'Switch to ' + other.name;
  document.getElementById('sw-modal-sub').textContent   = other.tagline;
  document.getElementById('sw-confirm-btn').textContent = 'Join ' + other.name + ' →';
}

function openSwitch() {
  document.getElementById('sw-pw').value     = '';
  document.getElementById('sw-err').textContent = '';
  document.getElementById('sw-overlay').classList.add('open');
  setTimeout(() => document.getElementById('sw-pw').focus(), 50);
}
function closeSwitch() {
  document.getElementById('sw-overlay').classList.remove('open');
}

function confirmSwitch() {
  const other = cfg.id === 'zelechat' ? ROOMS.whyhockey : ROOMS.zelechat;
  const pw    = document.getElementById('sw-pw').value;
  if (hashPw(pw) !== other.pwHash) {
    document.getElementById('sw-err').textContent = 'Wrong password — try again.';
    document.getElementById('sw-pw').select();
    return;
  }
  closeSwitch();

  // Tear down current room
  if (_msgRef)   { _msgRef.off();   _msgRef   = null; }
  if (_usersRef) { _usersRef.off(); _usersRef = null; }
  if (_typRef)   { _typRef.off();   _typRef   = null; }
  clearInterval(window._presInt);
  clearTypingStatus();
  db.ref(cfg.path + '/users/'  + me.uid).remove();
  db.ref(cfg.path + '/typing/' + me.uid).remove();

  // Switch config
  ENC_KEY = other.encPfx + pw + '_v2';
  cfg     = other;

  // Update UI
  document.documentElement.dataset.theme       = cfg.theme;
  document.getElementById('hdr-icon').textContent = cfg.icon;
  document.getElementById('hdr-name').textContent = cfg.name;
  document.getElementById('hdr-tag').textContent  = cfg.tagline;
  document.getElementById('empty-icon').textContent = cfg.icon;
  document.getElementById('msg-input').placeholder  = 'Message ' + cfg.name + '…';
  updateSwitchBtn();
  clearCtx();
  newMsgCnt = 0; updateFAB();
  _initDone = false;

  // Register in new room
  const pRef = db.ref(cfg.path + '/users/' + me.uid);
  pRef.set({ name: me.name, avId: me.avId, ts: Date.now() });
  pRef.onDisconnect().remove();
  window._presInt = setInterval(() => pRef.update({ ts: Date.now() }), 25000);

  listenMessages();
  listenUsers();
  listenTyping();
}

// ─────────────────────────────────────────────
//  EMOJI PICKER
// ─────────────────────────────────────────────
let emojiCatIdx = 0;

function buildEmojiPicker() {
  document.getElementById('emoji-cats').innerHTML = EMOJI_DATA
    .map((c, i) => `<button class="ecat${i === 0 ? ' on' : ''}" onclick="switchEmojiCat(${i},this)">${c.icon}</button>`)

  btn.classList.add('on');

function renderEmojiCat(idx) {

    .filter(c => c.trim())
    .map(e => `<span class="eg" onclick="insertEmoji('${e}')">${e}</span>`)
    .join('');
}

function insertEmoji(e) {
  const ta    = document.getElementById('msg-input');
  const s     = ta.selectionStart, end = ta.selectionEnd;
  ta.value    = ta.value.slice(0, s) + e + ta.value.slice(end);

function toggleEmojiPanel() {

// ─────────────────────────────────────────────
//  SOUND  (Web Audio synthesis)
// ─────────────────────────────────────────────
function loadSoundPref() {
  soundOn = localStorage.getItem('zc_sound') !== '0';
  applySoundUI();
}
function toggleSound() {
  soundOn = !soundOn;
  localStorage.setItem('zc_sound', soundOn ? '1' : '0');
  applySoundUI();
}
function applySoundUI() {
  document.getElementById('snd-on').style.display  = soundOn ? '' : 'none';
  document.getElementById('snd-off').style.display = soundOn ? 'none' : '';
}

function playSound() {
  if (!soundOn) return;
  try {
    const Ctx = window.AudioContext || window.webkitAudioContext;
    if (!Ctx) return;
    const ctx = new Ctx();
    if (ctx.state === 'suspended') ctx.resume();
    const t0 = ctx.currentTime;

    const ws = ctx.createWaveShaper();
    const N = 256, cv = new Float32Array(N);
    for (let i = 0; i < N; i++) { const x = (i * 2 / N) - 1; cv[i] = Math.tanh(5 * x); }
    ws.curve = cv;

    const bpf = ctx.createBiquadFilter();
    bpf.type = 'bandpass'; bpf.frequency.value = 960; bpf.Q.value = 2.1;

    const env = ctx.createGain();
    env.gain.setValueAtTime(0, t0);
    env.gain.linearRampToValueAtTime(0.28, t0 + 0.008);
    env.gain.setValueAtTime(0.28, t0 + 0.34);
    env.gain.exponentialRampToValueAtTime(0.001, t0 + 0.44);

    [[480, 1], [960, 0.5], [1440, 0.2]].forEach(([f, a]) => {
      const o = ctx.createOscillator(), g = ctx.createGain();
      o.type = 'sawtooth'; o.frequency.value = f; g.gain.value = a;
      o.connect(g); g.connect(ws); o.start(t0); o.stop(t0 + 0.5);
    });
    ws.connect(bpf); bpf.connect(env); env.connect(ctx.destination);
    setTimeout(() => { try { ctx.close(); } catch {} }, 700);
  } catch {}
}

// ─────────────────────────────────────────────
//  SCROLL & FAB
// ─────────────────────────────────────────────
function setupScrollFAB() {
  const msgs = document.getElementById('msgs');
  msgs.addEventListener('scroll', () => {
    const near = msgs.scrollHeight - msgs.scrollTop - msgs.clientHeight < 120;
    if (near) { newMsgCnt = 0; updateFAB(); }
  });
}

let _scrollTimer = null;
function scrollToBottom(force) {
  const el = document.getElementById('msgs');
  if (!el) return;
  const near = el.scrollHeight - el.scrollTop - el.clientHeight < 130;
  if (!force && !near) return;
  clearTimeout(_scrollTimer);
  _scrollTimer = setTimeout(() => requestAnimationFrame(() => {
    el.scrollTop = el.scrollHeight;
    newMsgCnt = 0; updateFAB();
  }), 40);
}

function updateFAB() {
  const fab  = document.getElementById('scroll-fab');
  const msgs = document.getElementById('msgs');
  const near = msgs.scrollHeight - msgs.scrollTop - msgs.clientHeight < 130;
  if (near || newMsgCnt === 0) {
    fab.classList.remove('visible');
  } else {
    document.getElementById('fab-count').textContent = newMsgCnt + ' new';
    fab.classList.add('visible');
  }
}

// ─────────────────────────────────────────────
//  UTILITIES
// ─────────────────────────────────────────────
function xss(s) {
  return String(s || '')
    .replace(/&/g, '&amp;').replace(/</g, '&lt;')
    .replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#039;');
}

function autoResize() {
  const ta = document.getElementById('msg-input');
  requestAnimationFrame(() => {
    ta.style.height = 'auto';
    ta.style.height = Math.min(ta.scrollHeight, 110) + 'px';
  });
}

let _toastTimer = null;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => t.classList.remove('show'), 6000);
}

// ─────────────────────────────────────────────
//  GLOBAL CLICK — close floating panels
// ─────────────────────────────────────────────
document.addEventListener('click', e => {
  if (!e.target.closest('.users-panel'))
    document.getElementById('users-dd').classList.remove('open');
  if (!e.target.closest('.emoji-wrap'))
    document.getElementById('emoji-panel').classList.remove('open');
  if (!e.target.closest('.bubble') && !e.target.closest('.bubble-actions'))
    closeAllActions();
});

// ─────────────────────────────────────────────
//  KEYBOARD — login Enter key
// ─────────────────────────────────────────────
document.getElementById('inp-name').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
document.getElementById('inp-pw').addEventListener('keydown',   e => { if (e.key === 'Enter') doLogin(); });

// ─────────────────────────────────────────────
//  BOOT
// ─────────────────────────────────────────────
reroll();
showScreen('sel-screen');
</script>
